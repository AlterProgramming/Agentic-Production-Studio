name: Studio validation

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

jobs:
  validator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify runner Python
        run: python3 --version
      - name: Install validation dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements-dev.txt
      - name: Run Python validation and builder tests
        run: python3 -m pytest -q
      - name: Verify runner Node
        run: node --version
      - name: Run visual workbench tests
        run: npm run test:workbench
      - name: Check browser module syntax
        run: node --check studio_workbench/src/core.js && node --check studio_workbench/src/app.js
